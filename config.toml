baseURL = 'https://aquarite.info/'
languageCode = 'ja-jp'
title = 'Hello, (forgotten) world ☂'
author = 'Mei Akizuru'
theme = 'blackburn'
copyright = "&copy; 2026 Mei Akizuru. All rights reserved."
canonifyurls = true
hasCJKLanguage = true
summaryLength = 140

ignoreErrors = ["error-remote-getjson"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    style = 'onedark'

[taxonomies]
  category = 'categories'
  tag = 'tags'

[params]
  brand = "aquarite.info"
  dateFormat = "02 Jan 2006, 15:04"
  disable_mathjax = true
  goatcounterAnalytics = "aquarite"
  title = 'Hello, (forgotten) world ☂'
  description = "Hello, (forgotten) world☂ -- Mei Akizuru Personal Website"
  images = ["/images/cover.png"]
  custom_css = [
    { url = "/css/custom.css", integrity = "sha512-FXP1227CzZeYzh0VmzEUa9muHOZzZic6t0AyIG+n7Ffjzh3jBHtB6ERAk8+pVmstPnpfKiN8Lb7uhZHzQKYYAA==", crossorigin = "anonymous" },
  ]

[permalinks]
  posts = '/blog/:year/:month/:slug'

[menu]
  # Shown in the side menu.
  [[menu.main]]
    name = "Home"
    pre = "<i class='fa fa-home fa-fw'></i>"
    weight = 1
    identifier = "home"
    url = "/"
  [[menu.main]]
    name = "About"
    pre = "<i class='fa fa-user fa-fw'></i>"
    weight = 3
    identifier = "about"
    url = "/about/"

[social]
  twitter = "maytheplic"
  github = "mayth"
  steam = "maythorzy"

[pagination]
  pagerSize = 10
